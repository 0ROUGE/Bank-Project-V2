<!DOCTYPE html>
<html>
<head>
    <title>Bank Login UI</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #1e1e1e; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); width: 300px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px solid #333; background: #2b2b2b; color: white; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #00e676; border: none; color: black; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #result { margin-top: 20px; padding: 10px; background: #2d2d2d; border-radius: 5px; font-family: monospace; white-space: pre-wrap; display: none; }
    </style>
</head>
<body>

<div class="login-box">
    <h2>Bank Login</h2>
    <input type="text" id="account" placeholder="Account Number (e.g., 1001)">
    <input type="password" id="pin" placeholder="PIN (e.g., 1112)">
    <button onclick="login()">Access Account</button>
    <div id="result"></div>
</div>

<script>
async function login() {
    const account = document.getElementById('account').value;
    const pin = document.getElementById('pin').value;
    const resultDiv = document.getElementById('result');
    
    resultDiv.style.display = "block";
    resultDiv.innerText = "Connecting to backend...";

    try {
        // This line makes a live network call to your FastAPI backend!
        const response = await fetch(`/view_account?account_number=${account}&Pin=${pin}`);
        const data = await response.json();

        if (response.ok) {
            // Success! Beautifully format the bank data on screen
            resultDiv.style.color = "#00e676";
            resultDiv.innerText = JSON.stringify(data, null, 2);
        } else {
            // Error handling (Wrong PIN or Account numbers)
            resultDiv.style.color = "#ff5252";
            resultDiv.innerText = `Error: ${data.detail}`;
        }
    } catch (error) {
        resultDiv.style.color = "#ff5252";
        resultDiv.innerText = "Cannot connect to backend server. Is Uvicorn running?";
    }
}
</script>

</body>
</html>
